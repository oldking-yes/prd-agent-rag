name: Deploy to Zeabur

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Zeabur
        run: npx zeabur@latest deploy
        env:
          ZEABUR_TOKEN: ${{ secrets.ZEABUR_TOKEN }}
        working-directory: backend
