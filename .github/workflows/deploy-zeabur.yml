name: Deploy to Zeabur

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set context and deploy
        run: |
          npx zeabur@latest auth login --token "${{ secrets.ZEABUR_TOKEN }}"
          npx zeabur@latest context set project --id="6a0e0bd0027db50e078220cf"
          npx zeabur@latest deploy --create --name "prd-agent-api"
        working-directory: backend
