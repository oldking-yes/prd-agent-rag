<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<script>window.__PRD_CONFIG__ = window.__PRD_CONFIG__ || {};</script>
<style>
/* ============================
   Reset & Base
   ============================ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html, body, #root {
  height: 100%;
  width: 100%;
  overflow: hidden;
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color 0.3s ease, color 0.3s ease;
}
/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
::selection { background: rgba(233,69,96,0.3); }

/* ============================
   Theme Variables
   ============================ */
:root, [data-theme="dark"] {
  --bg-primary: #0a0a1a;
  --bg-secondary: #12122a;
  --bg-surface: #1a1a2e;
  --bg-card: #16213e;
  --bg-elevated: #1e2a4a;
  --bg-input: rgba(255,255,255,0.04);
  --bg-hover: rgba(255,255,255,0.04);
  --text-primary: #e8e8f0;
  --text-secondary: #8b8ba7;
  --text-tertiary: #5c5c7a;
  --accent: #e94560;
  --accent-hover: #ff5a75;
  --accent-subtle: rgba(233,69,96,0.12);
  --blue: #0f3460;
  --blue-light: #1a4a7a;
  --blue-subtle: rgba(15,52,96,0.25);
  --border: rgba(255,255,255,0.06);
  --border-light: rgba(255,255,255,0.1);
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.2);
  --success: #4ade80;
  --warning: #fbbf24;
  --error: #ef4444;
  --code-bg: rgba(0,0,0,0.3);
  --table-stripe: rgba(255,255,255,0.02);
  --glass-bg: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.06);
}

[data-theme="light"] {
  --bg-primary: #f2f2f7;
  --bg-secondary: #e8e8ed;
  --bg-surface: #ffffff;
  --bg-card: #ffffff;
  --bg-elevated: #f8f8fa;
  --bg-input: rgba(0,0,0,0.03);
  --bg-hover: rgba(0,0,0,0.03);
  --text-primary: #1d1d1f;
  --text-secondary: #86868b;
  --text-tertiary: #aeaeb2;
  --accent: #e94560;
  --accent-hover: #d63850;
  --accent-subtle: rgba(233,69,96,0.08);
  --blue: #0f3460;
  --blue-light: #e8f0fe;
  --blue-subtle: rgba(15,52,96,0.08);
  --border: rgba(0,0,0,0.06);
  --border-light: rgba(0,0,0,0.1);
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.04);
  --success: #34a853;
  --warning: #f9ab00;
  --error: #ea4335;
  --code-bg: rgba(0,0,0,0.04);
  --table-stripe: rgba(0,0,0,0.02);
  --glass-bg: rgba(255,255,255,0.8);
  --glass-border: rgba(255,255,255,0.9);
}

/* ============================
   Layout
   ============================ */
.app-container {
  display: flex;
  height: 100vh;
  width: 100vw;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
}

/* ============================
   Login Page
   ============================ */
.login-page {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #0a0a1a 0%, #12122a 30%, #1a1a3e 60%, #0f3460 100%);
  position: relative;
  overflow: hidden;
}
.login-page::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(233,69,96,0.06) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(15,52,96,0.1) 0%, transparent 50%);
  animation: bgShift 20s ease-in-out infinite alternate;
}
@keyframes bgShift {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(-2%, -2%) rotate(3deg); }
}
.login-card {
  position: relative;
  width: 420px;
  max-width: 92vw;
  padding: 48px 40px;
  background: var(--glass-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow);
}
.login-card h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}
.login-card .subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 32px;
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.form-group input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-subtle);
}
.form-group input::placeholder {
  color: var(--text-tertiary);
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 12px 24px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(233,69,96,0.3); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary {
  background: var(--bg-input);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg-hover); border-color: var(--border-light); }
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: none;
  width: auto;
  padding: 6px 12px;
  font-weight: 500;
}
.btn-ghost:hover { color: var(--text-primary); background: var(--bg-hover); }
.btn-icon {
  width: 36px;
  height: 36px;
  padding: 0;
  border-radius: 8px;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.btn-icon:hover { background: var(--bg-hover); color: var(--text-primary); }
.auth-toggle {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: var(--text-secondary);
}
.auth-toggle button {
  background: none;
  border: none;
  color: var(--accent);
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
}
.auth-toggle button:hover { color: var(--accent-hover); }
.auth-error {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  color: var(--error);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
}
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
.spinner-sm { width: 14px; height: 14px; border-width: 2px; }
.spinner-dark { border-color: rgba(0,0,0,0.1); border-top-color: var(--accent); }
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================
   Sidebar
   ============================ */
.sidebar {
  width: 280px;
  min-width: 280px;
  height: 100vh;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 10;
}
.sidebar-header {
  padding: 20px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h2 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.3px;
}
.sidebar-header-actions {
  display: flex;
  gap: 4px;
}
.sidebar-actions {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.sidebar-actions .btn { justify-content: flex-start; font-size: 14px; padding: 10px 14px; }
.sidebar-actions .btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.conversation-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.conversation-item {
  padding: 12px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
  border: 1px solid transparent;
}
.conversation-item:hover { background: var(--bg-hover); }
.conversation-item.active {
  background: var(--accent-subtle);
  border-color: rgba(233,69,96,0.15);
}
.conversation-item .title {
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}
.conversation-item .meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-tertiary);
}
.conversation-item .preview {
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}
.conversation-list-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-tertiary);
  font-size: 14px;
  text-align: center;
  padding: 24px;
}
.conversation-list-empty svg { margin-bottom: 12px; opacity: 0.4; }

/* ============================
   Chat Area
   ============================ */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  min-width: 0;
  position: relative;
}
.chat-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: var(--bg-primary);
  z-index: 5;
}
.chat-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.chat-header-left .menu-btn {
  display: none;
  width: 32px;
  height: 32px;
  border-radius: 6px;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  align-items: center;
  justify-content: center;
}
.chat-header-left .menu-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.chat-header h3 {
  font-size: 15px;
  font-weight: 600;
}
.chat-header .conversation-title {
  font-size: 15px;
  font-weight: 600;
}
.chat-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.chat-header-right .btn-icon svg { width: 20px; height: 20px; }
.message-list {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.message-list-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  text-align: center;
  padding: 40px;
}
.message-list-empty .empty-icon { margin-bottom: 16px; opacity: 0.3; }
.message-list-empty h3 { font-size: 18px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
.message-list-empty p { font-size: 14px; max-width: 360px; line-height: 1.6; }

/* Tutorial empty state */
.tutorial { padding: 24px 32px !important; max-width: 700px !important; margin: 0 auto; text-align: left !important; overflow-y: auto; max-height: 100%; }
.tutorial-hero { text-align: center; margin-bottom: 28px; }
.tutorial-hero-icon { margin-bottom: 8px; }
.tutorial-hero h2 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
.tutorial-hero-desc { font-size: 14px; color: var(--text-secondary); }
.tutorial-section { margin-bottom: 24px; }
.tutorial-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.tutorial-section-header h3 { font-size: 15px; font-weight: 600; }
.tutorial-section-badge { font-size: 11px; color: var(--text-tertiary); background: var(--bg-surface); padding: 3px 10px; border-radius: 20px; }
.kb-preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.kb-preview-card { background: var(--bg-surface); border-radius: 10px; padding: 14px; cursor: default; border: 1px solid var(--border); transition: all 0.2s; }
.kb-preview-card:hover { border-color: var(--border-light); background: var(--bg-elevated); }
.kb-card-icon { font-size: 22px; margin-bottom: 6px; }
.kb-card-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
.kb-card-desc { font-size: 11px; color: var(--text-tertiary); line-height: 1.4; }
.prompt-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.prompt-chip { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
.prompt-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }
.prd-preview { background: var(--bg-surface); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
.prd-preview-header { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
.prd-preview-tag { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 12px; }
.prd-preview-body { padding: 14px; }
.prd-preview-line { height: 8px; background: var(--bg-input); border-radius: 4px; margin-bottom: 8px; }
.prd-preview-tag-sm { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 8px; }
.tutorial-quickstart { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--bg-surface); border-radius: 10px; padding: 14px 20px; flex-wrap: wrap; }
.quickstart-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
.quickstart-number { width: 22px; height: 22px; border-radius: 50%; background: var(--accent-subtle); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; flex-shrink: 0; }
.quickstart-arrow { color: var(--text-tertiary); font-size: 16px; }
.message {
  display: flex;
  gap: 12px;
  max-width: 800px;
  animation: msgIn 0.25s ease-out;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.assistant { align-self: flex-start; }
.message .avatar {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
  margin-top: 4px;
}
.message.user .avatar { background: var(--accent); color: #fff; }
.message.assistant .avatar { background: var(--blue); color: var(--text-primary); }
.message .bubble {
  padding: 14px 18px;
  border-radius: 14px;
  font-size: 15px;
  line-height: 1.65;
  min-width: 0;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.message.user .bubble {
  background: var(--accent-subtle);
  border: 1px solid rgba(233,69,96,0.15);
  border-bottom-right-radius: 4px;
}
.message.assistant .bubble {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message .timestamp {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
  padding: 0 4px;
}

/* ============================
   Markdown Content
   ============================ */
.markdown-content { line-height: 1.7; }
.markdown-content > *:first-child { margin-top: 0; }
.markdown-content > *:last-child { margin-bottom: 0; }
.markdown-content h1 { font-size: 24px; font-weight: 700; margin: 28px 0 12px; letter-spacing: -0.5px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.markdown-content h2 { font-size: 20px; font-weight: 600; margin: 24px 0 10px; letter-spacing: -0.3px; }
.markdown-content h3 { font-size: 17px; font-weight: 600; margin: 20px 0 8px; }
.markdown-content h4 { font-size: 15px; font-weight: 600; margin: 16px 0 6px; }
.markdown-content p { margin: 10px 0; }
.markdown-content ul, .markdown-content ol { margin: 8px 0; padding-left: 24px; }
.markdown-content li { margin: 4px 0; }
.markdown-content blockquote {
  margin: 12px 0;
  padding: 10px 16px;
  border-left: 3px solid var(--accent);
  background: var(--bg-hover);
  border-radius: 0 8px 8px 0;
  color: var(--text-secondary);
}
.markdown-content code {
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 13px;
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--accent);
}
.markdown-content pre {
  margin: 12px 0;
  padding: 16px;
  background: var(--code-bg);
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow-x: auto;
}
.markdown-content pre code {
  padding: 0;
  background: transparent;
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.6;
}
.markdown-content a {
  color: var(--accent);
  text-decoration: none;
}
.markdown-content a:hover { text-decoration: underline; }
.markdown-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.markdown-content strong { font-weight: 600; }
.markdown-content table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin: 16px 0;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
  font-size: 14px;
}
.markdown-content thead { background: var(--bg-elevated); }
.markdown-content th {
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}
.markdown-content td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.markdown-content tbody tr:last-child td { border-bottom: none; }
.markdown-content tbody tr:nth-child(even) { background: var(--table-stripe); }
.markdown-content tbody tr:hover { background: var(--bg-hover); }

/* Priority Badges */
.priority-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
  margin-right: 4px;
  vertical-align: middle;
}
.priority-P0, .priority-p0 { background: rgba(239,68,68,0.15); color: #ef4444; }
.priority-P1, .priority-p1 { background: rgba(251,191,36,0.15); color: #fbbf24; }
.priority-P2, .priority-p2 { background: rgba(74,222,128,0.15); color: #4ade80; }

/* ============================
   Agent Status Indicator
   ============================ */
.agent-status {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  margin: 0 24px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 13px;
  color: var(--text-secondary);
  animation: statusIn 0.2s ease-out;
}
@keyframes statusIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.agent-status .status-dots {
  display: flex;
  gap: 4px;
}
.agent-status .status-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: dotBounce 1.4s infinite ease-in-out both;
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const now = new Date();
  const diff = now - d;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + 'd ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function renderMarkdown(content) {
  if (!content || !markedParse) return content || '';
  const opts = { breaks: true, gfm: true };
  let html;
  try { html = markedParse(content, opts); } catch(e) { return content; }
  html = html.replace(/\b(P[0-2])\b(?!["'</])/g, (m) => {
    return `<span class="priority-badge priority-${m}">${m}</span>`;
  });
  return html;
}

  const token = localStorage.getItem('token');
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API + path, { ...options, headers });
  if (res.status === 401 && path !== '/auth/login' && path !== '/auth/register') {
    localStorage.removeItem('token');
    window.location.reload();
    throw new Error('会话已过期');
  }
  if (!res.ok) {
    let msg;
    try { const d = await res.json(); msg = d.detail || d.message || d.msg || JSON.stringify(d); } catch(e) { msg = `Error ${res.status}`; }
    throw new Error(msg);

  if (res.status === 204) return null;
  return res.json();
}

/* ============================
   Login Page
   ============================ */
function LoginPage({ onLogin }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('test@test.com');
  const [password, setPassword] = useState('test1234');
  const [fullName, setFullName] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      if (mode === 'login') {
        // Login endpoint expects form-urlencoded (OAuth2 spec)
        const formBody = new URLSearchParams({ username: email, password });
        const res = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formBody
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data?.error?.message || '登录失败');
        if (data.access_token) {
          localStorage.setItem('token', data.access_token);
          onLogin(data.access_token);
        } else throw new Error('未获取到令牌');
      } else {
        await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ email, password, full_name: fullName })
        });
        setMode('login');
        setError('注册成功！请登录。');
      }

      setError(err.message);
    } finally {
      setLoading(false);
    }

            type: 'text', placeholder: '你的姓名', required: true,
            value: fullName, onChange: e => setFullName(e.target.value)
          })
        ),
        React.createElement('div', { className: 'form-group' },
          React.createElement('label', null, '邮箱'),

function KBModal({ onClose }) {
  const [collections, setCollections] = useState([]);
  const [loading, setLoading] = useState(true);
  const [uploading, setUploading] = useState(false);
  const [selectedCollection, setSelectedCollection] = useState('');
  const [uploadStatus, setUploadStatus] = useState('');
  const [dragover, setDragover] = useState(false);
  const addToast = useContext(ToastContext);

  const loadCollections = useCallback(async () => {
    setLoading(true);
    try {
      const data = await apiFetch('/rag/collections');
      const list = Array.isArray(data) ? data : (data.collections || data.data || []);
      setCollections(list);
      if (list.length > 0 && !selectedCollection) setSelectedCollection(list[0].name || list[0]);
    } catch (err) {
      setCollections([]);
      addToast('加载集合失败: ' + err.message, 'error');
    } finally {
      setLoading(false);
    }
  }, [addToast]);

  useEffect(() => { loadCollections(); }, [loadCollections]);

  const handleUpload = async (file) => {
    if (!selectedCollection || !file) return;
    setUploading(true);
    setUploadStatus('Uploading ' + file.name + '...');
    try {
      const token = localStorage.getItem('token');
      const form = new FormData();
      form.append('file', file);
      const res = await fetch(`${API}/rag/collections/${encodeURIComponent(selectedCollection)}/ingest`, {
        method: 'POST',
        headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        body: form
      });
      if (!res.ok) {
        let msg; try { const d = await res.json(); msg = d.detail || d.message || JSON.stringify(d); } catch(e) { msg = `Error ${res.status}`; }
        throw new Error(msg);
      }
      setUploadStatus('上传成功！');
      addToast('文档已上传到 ' + selectedCollection, 'success');
      setTimeout(() => setUploadStatus(''), 2000);
    } catch (err) {
      setUploadStatus('上传失败: ' + err.message);
      addToast('上传失败: ' + err.message, 'error');
    } finally {
      setUploading(false);
    }
  };

  const handleFileChange = (e) => {
    const file = e.target.files?.[0];
    if (file) handleUpload(file);
    e.target.value = '';
  };

  const handleDrop = (e) => {
    e.preventDefault();
    setDragover(false);
    const file = e.dataTransfer?.files?.[0];
    if (file) handleUpload(file);
  };

  return React.createElement('div', { className: 'modal-overlay', onClick: (e) => { if (e.target === e.currentTarget) onClose(); } },
    React.createElement('div', { className: 'modal-content' },

        React.createElement('button', { className: 'close-btn', onClick: onClose }, Icons.x)
      ),
      React.createElement('div', { className: 'modal-body' },
        React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 } },
          React.createElement('span', { style: { fontSize: 14, fontWeight: 500 } }, '集合'),
          React.createElement('button', { className: 'btn-icon', onClick: loadCollections, title: '刷新' }, Icons.refresh)
        ),
        loading
          ? React.createElement('div', { style: { textAlign: 'center', padding: 20, color: 'var(--text-tertiary)' } }, '加载中...')
          : collections.length === 0
              ? React.createElement('div', { style: { textAlign: 'center', padding: 20, color: 'var(--text-tertiary)' } },
                  '暂无集合，请确认 RAG 服务已启动'
                )
              : React.createElement('div', { className: 'collection-list' },
                  collections.map(c => {
                    const name = c.name || c;
                    const count = c.document_count ?? c.count ?? c.doc_count;
                    return React.createElement('div', {
                      key: name,

            '上传到: ',

          ),

/* ============================
   Main App
   ============================ */
function App() {
  const [token, setToken] = useState(() => localStorage.getItem('token'));
  const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'dark');
  const [conversations, setConversations] = useState([]);
  const [activeConvId, setActiveConvId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [agentStatus, setAgentStatus] = useState('idle');
  const [streamContent, setStreamContent] = useState('');
  const [showKB, setShowKB] = useState(false);
  const [showNewConv, setShowNewConv] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [loadingConv, setLoadingConv] = useState(false);
  const wsRef = useRef(null);
  const addToast = useContext(ToastContext);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
  }, [theme]);

  const toggleTheme = useCallback(() => {
    setTheme(t => t === 'dark' ? 'light' : 'dark');
  }, []);

  // Load conversations
  const loadConversations = useCallback(async () => {
    try {
      const data = await apiFetch('/conversations');
      setConversations(Array.isArray(data) ? data : (data.conversations || data.data || []));
    } catch (err) {
      console.error('Failed to load conversations:', err);
    }
  }, []);

  useEffect(() => {
    if (token) loadConversations();
  }, [token, loadConversations]);

  // Load messages for active conversation
  const loadMessages = useCallback(async (convId) => {
    if (!convId) { setMessages([]); return; }
    setLoadingConv(true);
    try {
      const data = await apiFetch('/conversations/' + convId);
      const msgs = data.messages || data.data?.messages || [];
      setMessages(msgs.map(m => ({ ...m, temp_id: m.id || generateId() })));
    } catch (err) {
      addToast('加载消息失败: ' + err.message, 'error');
      setMessages([]);
    } finally {
      setLoadingConv(false);
    }
  }, [addToast]);

  useEffect(() => {
    if (activeConvId) loadMessages(activeConvId);
    else setMessages([]);
  }, [activeConvId, loadMessages]);

  // WebSocket handling
  const stopStream = useCallback(() => {
    if (wsRef.current) {
      wsRef.current.close();
      wsRef.current = null;
    }
    setAgentStatus('idle');
    setStreamContent('');
  }, []);

  const sendMessage = useCallback(async (text) => {
    if (!text.trim()) return;

    // Auto-create conversation if none active
    let convId = activeConvId;
    if (!convId) {
      try {
        const data = await apiFetch('/conversations', {
          method: 'POST',
          body: JSON.stringify({ title: '新 PRD 分析' })
        });
        convId = data.id;
        setActiveConvId(convId);
        loadConversations();
      } catch (err) {
        addToast('创建对话失败: ' + err.message, 'error');
        return;
      }
    }

    // Add user message optimistically
    const userMsg = { role: 'user', content: text, temp_id: 'u' + generateId(), created_at: new Date().toISOString() };
    setMessages(prev => [...prev, userMsg]);

    // Add placeholder assistant message
    const assistantId = 'a' + generateId();
    const assistantMsg = { role: 'assistant', content: '', temp_id: assistantId };
    setMessages(prev => [...prev, assistantMsg]);

    // POST message to API
    try {
      await apiFetch('/conversations/' + convId + '/messages', {
        method: 'POST',
        body: JSON.stringify({ role: 'user', content: text })
      });
      loadConversations();
    } catch (err) {
      addToast('保存消息失败: ' + err.message, 'error');
    }

    // Connect WebSocket for agent streaming
    try {
      const ws = new WebSocket(WS_URL, 'access_token.' + token);
      wsRef.current = ws;
      setAgentStatus('connecting');

      ws.onopen = () => {
        setAgentStatus('streaming');
        // Send message to trigger agent
        ws.send(JSON.stringify({
          message: text,
          conversation_id: convId,
          file_ids: []
        }));
      };

      ws.onmessage = (event) => {
        let data;
        try { data = JSON.parse(event.data); } catch(e) {
                    setStreamContent(prev => prev + event.data);
          setMessages(prev => prev.map(m =>
            m.temp_id === assistantId ? { ...m, content: m.content + event.data } : m
          ));
          return;
        }
        
        if (data.type === 'status') {
          setAgentStatus(data.status === 'thinking' ? 'thinking' : 'streaming');
        } else if (data.type === 'chunk' || data.type === 'text') {
          const chunk = data.data?.content || data.content || '';
          setStreamContent(prev => prev + chunk);
          setMessages(prev => prev.map(m =>
            m.temp_id === assistantId ? { ...m, content: m.content + chunk } : m
          ));
        } else if (data.type === 'message' || data.type === 'assistant_response') {
          const content = data.data?.content || data.content || '';
          setMessages(prev => prev.map(m =>
            m.temp_id === assistantId ? { ...m, content } : m
          ));
        } else if (data.type === 'done' || data.type === 'complete') {
          setAgentStatus('done');
          ws.close();
          wsRef.current = null;
          loadConversations();
          loadMessages(convId);
        } else if (data.type === 'error') {
          addToast('Agent 错误: ' + (data.content || data.message || '未知错误'), 'error');
          setAgentStatus('done');
          ws.close();
          wsRef.current = null;
        } else if (data.content) {
          setMessages(prev => prev.map(m =>
            m.temp_id === assistantId ? { ...m, content: m.content + (data.content || '') } : m
          ));
        }
      };

      ws.onerror = () => {
        addToast('WebSocket 连接失败，请确认后端正在运行', 'error');
        setAgentStatus('done');
        setMessages(prev => prev.filter(m => m.temp_id !== assistantId || m.content));
      };

      ws.onclose = () => {
        setAgentStatus('done');
        wsRef.current = null;
      };
    } catch (err) {
      addToast('连接失败: ' + err.message, 'error');
      setAgentStatus('done');
      setMessages(prev => prev.filter(m => m.temp_id !== assistantId || m.content));
    }
  }, [activeConvId, token, loadConversations, loadMessages, addToast]);

  const createConversation = useCallback(async (title) => {
    const data = await apiFetch('/conversations', {
      method: 'POST',
      body: JSON.stringify({ title: title || '新建 PRD' })
    });
    const conv = data.id ? data : (data.conversation || data.data);
    if (conv?.id) {
      setConversations(prev => [conv, ...prev]);
      setActiveConvId(conv.id);
    } else throw new Error('创建对话失败');
  }, []);

  const handleLogout = useCallback(() => {
    localStorage.removeItem('token');
    stopStream();
    setToken(null);
    setConversations([]);
    setActiveConvId(null);
    setMessages([]);
  }, [stopStream]);

  // Auto-login check
  useEffect(() => {
    if (token) {
      apiFetch('/conversations').then(() => {}).catch(() => {
        localStorage.removeItem('token');
        setToken(null);
      });
    }
  }, []);

  if (!token) return React.createElement(LoginPage, { onLogin: (t) => { setToken(t); loadConversations(); } });

  const activeConv = conversations.find(c => c.id === activeConvId);

  return React.createElement('div', { className: 'app-container' },
    React.createElement(Sidebar, {
      conversations,
      activeId: activeConvId,
      onSelect: setActiveConvId,
      onNew: () => setShowNewConv(true),
      onOpenKB: () => setShowKB(true),
      onLogout: handleLogout,
      theme,
      toggleTheme,
      mobileOpen: sidebarOpen,
      onMobileClose: () => setSidebarOpen(false)
    }),
    React.createElement(ChatArea, {
      conversation: activeConv,
      messages,
      agentStatus,
      onSend: sendMessage,
      onStopStream: stopStream,
      onMobileMenu: () => setSidebarOpen(true)
    }),
    showKB && React.createElement(KBModal, { onClose: () => setShowKB(false) }),
    showNewConv && React.createElement(NewConversationDialog, {
      onClose: () => setShowNewConv(false),
      onCreate: createConversation
    })
  );
}

/* ============================
   Entry Point
   ============================ */
const rootElem = document.getElementById('root');
if (rootElem) {
  const root = createRoot(rootElem);
  root.render(
    React.createElement(ToastProvider, null,
      React.createElement(App)
    )
  );
}
</script>
</body>
</html>
